specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Urjanet
providerId: urjanet
created: '2026-06-21'
modified: '2026-06-21'
reconciled: false
tags:
- Utility Data
- Energy
- Aggregation
- Rate Limiting
- Quotas
- Throttling
description: >-
  Urjanet (now part of Arcadia) does not publish specific public rate limits or
  quota values for its Utility Cloud / "Arc" API. As a sales-led, contract-based
  platform, throttling and concurrency limits are governed by the customer
  agreement and are not documented in the public API reference. Any specific
  per-endpoint limits are not reconciled in this artifact.
notes: >-
  Confirm applicable rate limits, retry behavior, and throttling response codes
  directly with Arcadia / Urjanet under contract; no public values are
  published as of the creation date.
sources:
- https://docs.arcadia.com/v1.0-Utility-Cloud/reference/introduction
- https://docs.arcadia.com/v1.0-Utility-Cloud/docs/api-quick-start-guide
responseCodes:
  throttled: 429
limits:
- name: API Requests
  scope: account
  metric: requests
  limit: see provider documentation
  notes: No public rate limit published; governed by contract.
policies:
- name: Contract-Governed Limits
  description: Rate and concurrency limits are defined by the customer's commercial agreement, not a public tier.
- name: Backoff Strategy
  description: Clients should implement exponential backoff with jitter and honor Retry-After on 429 responses.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
