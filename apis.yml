aid: urjanet
url: https://raw.githubusercontent.com/api-evangelist/urjanet/refs/heads/main/apis.yml
name: Urjanet
kind: company
description: Urjanet (now part of Arcadia) is a utility-data aggregation platform that
  programmatically collects utility bill, statement, meter, and interval usage data
  from thousands of electricity, gas, water, waste, and telecom providers worldwide.
  Following Arcadia's 2022 acquisition, Urjanet's data access powers the Arcadia
  "Arc" / Utility Cloud platform, exposed through a REST API (base URL
  https://api.urjanet.com) for connecting utility credentials and retrieving
  normalized utility data. Pricing is sales-led and not publicly published.
